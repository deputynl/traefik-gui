services:
  traefik-gui:
    image: ghcr.io/deputynl/traefik-gui:latest
    container_name: traefik-gui
    restart: unless-stopped
    environment:
      TRAEFIK_CONFIG_PATH: /etc/traefik/traefik.yml
      TRAEFIK_API_URL: http://traefik:8080
      TRAEFIK_GUI_USER: ${TRAEFIK_GUI_USER:-admin}
      TRAEFIK_GUI_PASSWORD: ${TRAEFIK_GUI_PASSWORD:-admin}
      # Set these if the paths inside the Traefik container differ from where
      # the files are mounted here (e.g. acme.json stored at /acme.json in Traefik).
      TRAEFIK_ACME_PATH: /etc/traefik/acme.json
      # Name of the Traefik container to stream access logs from (enables Activity view).
      TRAEFIK_CONTAINER_NAME: traefik
    volumes:
      # Mount your Traefik config directory (read + write so the GUI can save changes).
      - /etc/traefik:/etc/traefik
      # Mount Docker socket (read-only) to enable the Docker Labels inspector.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      # Must be on the same network as Traefik so the GUI can reach the API
      # and so Traefik can route to the GUI via labels below.
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-gui.rule=Host(`traefik-gui.deputy.nl`)"
      - "traefik.http.routers.traefik-gui.entrypoints=websecure"
      - "traefik.http.routers.traefik-gui.tls.certresolver=cf-dns"
      - "traefik.http.services.traefik-gui.loadbalancer.server.port=8888"

networks:
  traefik:
    external: true
