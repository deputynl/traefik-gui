http:
  serversTransports:
    insecure-skip:
      insecureSkipVerify: true

  routers:
    pve:
      rule: "Host(`pve.deputy.nl`)"
      entryPoints:
        - websecure
      service: pve-svc
      tls:
        certResolver: cf-dns

  services:
    pve-svc:
      loadBalancer:
        serversTransport: insecure-skip
        servers:
          - url: "https://10.1.1.2:8006"
        passHostHeader: true
