http:
  routers:
    webtop:
      rule: "Host(`webtop.deputy.nl`)"
      entryPoints:
        - websecure
      service: webtop-svc
      tls:
        certResolver: cf-dns

  services:
    webtop-svc:
      loadBalancer:
        servers:
          - url: "http://10.1.1.8:8686"
        passHostHeader: true
