http:
  serversTransports:
    insecure-skip:
      insecureSkipVerify: true

  routers:
    unifi:
      rule: "Host(`unifi.deputy.nl`)"
      entryPoints:
        - websecure
      service: unifi-svc
      tls:
        certResolver: cf-dns

  services:
    unifi-svc:
      loadBalancer:
        serversTransport: insecure-skip
        servers:
          - url: "https://10.1.1.1"
        passHostHeader: true
