http:
  serversTransports:
    insecure-skip:
      insecureSkipVerify: true

  routers:
    cockpit:
      rule: "Host(`cockpit.deputy.nl`)"
      entryPoints:
        - websecure
      service: cockpit-svc
      tls:
        certResolver: cf-dns

  services:
    cockpit-svc:
      loadBalancer:
        serversTransport: insecure-skip
        servers:
          - url: "https://10.1.1.8:9090"
        passHostHeader: true
